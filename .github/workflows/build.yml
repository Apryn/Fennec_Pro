name: Build Release Binaries

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (Java 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Fetch Pub Packages
        run: |
          cd fennec_pro_mobile
          flutter pub get

      - name: Setup Release Signing (from GitHub Secrets)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > fennec_pro_mobile/android/app/fennec-release.jks
            
            ACTUAL_STORE_PASS="${STORE_PASSWORD:-FennecPro2025!}"
            ACTUAL_KEY_PASS="${KEY_PASSWORD:-FennecPro2025!}"
            ACTUAL_ALIAS="${KEY_ALIAS:-fennec}"
            
            printf "storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=fennec-release.jks\n" \
              "$ACTUAL_STORE_PASS" "$ACTUAL_KEY_PASS" "$ACTUAL_ALIAS" \
              > fennec_pro_mobile/android/key.properties
            echo "✅ Release signing configured"
          else
            echo "⚠️ No signing secrets found, using debug signing as fallback"
          fi

      - name: Build Release APK
        run: |
          cd fennec_pro_mobile
          flutter build apk --release

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: fennec-pro-release-apk
          path: fennec_pro_mobile/build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Fetch Pub Packages
        run: |
          cd fennec_pro_mobile
          flutter pub get

      - name: Build iOS (No Codesign)
        run: |
          cd fennec_pro_mobile
          flutter build ios --release --no-codesign

      - name: Upload iOS Runner App
        uses: actions/upload-artifact@v4
        with:
          name: fennec-pro-release-ios
          path: fennec_pro_mobile/build/ios/iphoneos/Runner.app
